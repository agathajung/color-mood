<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="오늘의 컬러로 당신의 무드를 발견하세요">
  <meta property="og:title" content="오늘의 컬러 무드">
  <meta property="og:description" content="7번의 선택으로 찾는 나만의 컬러">
  <title>오늘의 컬러 무드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ===== TOKENS ===== */
    :root {
      --bg:           #FAFAF8;
      --bg-card:      #FFFFFF;
      --text-primary: #1A1A1A;
      --text-muted:   #8A8A8A;
      --border:       rgba(0,0,0,0.08);
      --radius-card:  999px;
      --radius-btn:   100px;
      --shadow-card:  0 4px 28px rgba(0,0,0,0.09);
      --shadow-hover: 0 16px 48px rgba(0,0,0,0.16);
      --transition:   320ms cubic-bezier(0.4, 0, 0.2, 1);
      --font:         'Noto Sans KR', -apple-system, sans-serif;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; }

    /* ===== APP ROOT ===== */
    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ===== SCREEN BASE ===== */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 420ms ease, transform 420ms ease;
    }
    .screen--visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===========================
       INTRO SCREEN
    =========================== */
    .screen--intro {
      align-items: center;
      justify-content: center;
      padding: 48px 28px;
      text-align: center;
    }

    .intro__eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .intro__title {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1.15;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    .intro__title em {
      font-style: normal;
      position: relative;
      display: inline-block;
    }

    .intro__title em::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--text-primary);
      opacity: 0.15;
      border-radius: 2px;
    }

    .intro__sub {
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.9;
      color: var(--text-muted);
      margin-bottom: 52px;
      max-width: 300px;
    }

    .intro__color-preview {
      display: flex;
      gap: 10px;
      margin-bottom: 52px;
      justify-content: center;
    }

    .intro__dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      animation: pulse-dot 2.4s ease-in-out infinite;
    }
    .intro__dot:nth-child(2) { animation-delay: 0.3s; }
    .intro__dot:nth-child(3) { animation-delay: 0.6s; }
    .intro__dot:nth-child(4) { animation-delay: 0.9s; }
    .intro__dot:nth-child(5) { animation-delay: 1.2s; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.25); }
    }

    /* ===========================
       ROUND SCREEN
    =========================== */
    .screen--round {
      padding: 0;
    }

    .round-header {
      padding: 32px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .round-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .round-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .round-count {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: rgba(0,0,0,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar__fill {
      height: 100%;
      background: var(--text-primary);
      border-radius: 2px;
      transition: width 500ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .round-prompt {
      font-size: 1.15rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    /* Color Card Grid — vertical stack of horizontal ovals */
    .color-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 8px 24px 40px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    .color-card {
      width: 100%;
      height: 140px;
      border-radius: var(--radius-card);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition), box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
      outline: none;
      flex-shrink: 0;
    }

    .color-card:hover {
      transform: scale(1.025) translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .color-card:focus-visible {
      box-shadow: var(--shadow-hover), 0 0 0 3px rgba(255,255,255,0.7), 0 0 0 5px var(--text-primary);
    }

    .color-card:active {
      transform: scale(0.975);
      transition-duration: 100ms;
    }

    .color-card__info {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px 32px;
      background: linear-gradient(135deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.06) 100%);
      transition: background var(--transition);
    }

    .color-card:hover .color-card__info,
    .color-card:focus-visible .color-card__info {
      background: linear-gradient(135deg, rgba(0,0,0,0.32) 0%, rgba(0,0,0,0.14) 100%);
    }

    .color-card__name {
      font-size: 1.05rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.01em;
      text-shadow: 0 1px 8px rgba(0,0,0,0.25);
      text-align: center;
      line-height: 1.3;
    }

    .color-card__name-en {
      font-size: 0.72rem;
      font-weight: 300;
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.1em;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0,0,0,0.2);
      text-transform: uppercase;
    }

    .color-card--selected {
      transform: scale(0.96) !important;
      transition-duration: 150ms !important;
    }

    /* ===========================
       RESULT SCREEN
    =========================== */
    .screen--result {
      padding: 0;
    }

    .result-color-band {
      width: 100%;
      height: 280px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .result-color-band__inner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 28px 32px;
    }

    .result-color-band__badge {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.22);
      padding: 6px 16px;
      border-radius: 100px;
      backdrop-filter: blur(8px);
    }

    .result-content {
      padding: 36px 28px 80px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .result-name {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 300;
      letter-spacing: -0.035em;
      line-height: 1.15;
    }

    .result-sentence {
      font-size: 1rem;
      font-weight: 300;
      line-height: 2;
      color: var(--text-muted);
    }

    .result-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 100px;
      letter-spacing: 0.04em;
    }

    /* Section heading */
    .section-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ── Category color palette ── */
    .category-palette { display: flex; flex-direction: column; }

    .category-colors {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cat-color-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cat-color-swatch {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition);
      cursor: default;
    }

    .cat-color-swatch:hover { transform: scale(1.1); }

    .cat-color-swatch--winner {
      width: 56px;
      height: 56px;
      box-shadow: var(--shadow-hover);
    }

    .cat-color-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cat-color-name {
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .cat-color-hex {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.05em;
    }

    .cat-color-winner-badge {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: #fff;
      background: var(--text-primary);
      padding: 3px 10px;
      border-radius: 100px;
      margin-left: 4px;
    }

    /* ── Complementary palette ── */
    .comp-palette { display: flex; flex-direction: column; }

    .comp-row {
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }

    .comp-swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .comp-swatch__circle {
      border-radius: 50%;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition);
      cursor: default;
    }

    .comp-swatch__circle:hover { transform: scale(1.1); }

    .comp-swatch--main .comp-swatch__circle {
      width: 64px;
      height: 64px;
    }

    .comp-swatch--secondary .comp-swatch__circle {
      width: 48px;
      height: 48px;
    }

    .comp-swatch__hex {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.03em;
    }

    /* ── Product section ── */
    .product-section { display: flex; flex-direction: column; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .product-card {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1px solid var(--border);
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .product-card__image {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .product-card__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-card__placeholder {
      font-size: 1.6rem;
      opacity: 0.22;
    }

    .product-card__body {
      padding: 12px;
    }

    .product-card__name {
      font-size: 0.75rem;
      font-weight: 400;
      line-height: 1.45;
      color: var(--text-primary);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-card__price {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .product-card__link {
      display: block;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 8px;
      transition: background var(--transition), color var(--transition);
    }

    .product-card__link:hover {
      background: var(--text-primary);
      color: #fff;
    }

    /* Action buttons */
    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ===========================
       BUTTONS
    =========================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      border-radius: var(--radius-btn);
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .btn--primary {
      background: var(--text-primary);
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.14);
    }

    .btn--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.2);
    }

    .btn--primary:active {
      transform: translateY(0);
    }

    .btn--ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn--ghost:hover {
      color: var(--text-primary);
      border-color: rgba(0,0,0,0.2);
    }

    /* ===========================
       TOAST
    =========================== */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-primary);
      color: #fff;
      padding: 13px 28px;
      border-radius: var(--radius-btn);
      font-size: 0.83rem;
      opacity: 0;
      transition: opacity 300ms ease, transform 300ms ease;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }

    .toast--visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===========================
       DESKTOP OVERRIDES
    =========================== */
    @media (min-width: 768px) {
      .screen--result {
        flex-direction: row;
        min-height: 100dvh;
      }

      .result-color-band {
        width: 380px;
        height: auto;
        min-height: 100dvh;
        flex-shrink: 0;
        position: sticky;
        top: 0;
        align-self: flex-start;
      }

      .result-color-band__inner {
        align-items: flex-start;
        padding: 48px 36px;
      }

      .result-content {
        padding: 56px 48px 80px;
        max-width: 580px;
      }

      .round-header {
        padding: 40px 40px 28px;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
      }

      .color-grid {
        padding: 8px 40px 60px;
      }

      .result-actions {
        flex-direction: row;
      }

      .btn { flex: 1; }
    }
  </style>
</head>
<body>
  <div id="app" role="main" aria-live="polite"></div>

    /* ================================================

    ================================================ */
    const TournamentEngine = {
      TOTAL_ROUNDS: 7,
      _pool: [],
      _round: 0,
      _lastPick: null,

      _shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      },

      init() {
        this._pool = this._shuffle([...COLOR_DATA]);
        this._round = 0;
        this._lastPick = null;
      },

      nextRound() {
        this._round++;
        const opts = [];

        if (this._lastPick) {
          opts.push(this._lastPick);
          const idx = this._pool.indexOf(this._lastPick);
          if (idx !== -1) this._pool.splice(idx, 1);
        }

        while (opts.length < 3 && this._pool.length > 0) {
          opts.push(this._pool.shift());
        }

        return opts;
      },

      pick(colorObj) {
        this._lastPick = colorObj;
        if (this._round >= this.TOTAL_ROUNDS) {
          return { done: true, winner: colorObj };
        }
        return { done: false, winner: null };
      },

      getProgress() {
        return { current: this._round, total: this.TOTAL_ROUNDS };
      }
    };

        `);

        // Animate progress bar
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const fill = this._root.querySelector('.progress-bar__fill');
            if (fill) fill.style.width = pct + '%';
          });
        });

        // Event delegation
        const grid = this._root.querySelector('.color-grid');
        const handleSelect = (e) => {
          const card = e.target.closest('.color-card');
          if (!card || card.dataset.selecting) return;
          card.dataset.selecting = '1';
          const idx = parseInt(card.dataset.index, 10);
          card.classList.add('color-card--selected');
          setTimeout(() => App.handlePick(options[idx]), 320);
        };

        grid.addEventListener('click', handleSelect);
        grid.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            handleSelect(e);
          }
        });

                <span class="cat-color-name">
                  ${c.name}
                  ${isWinner ? '<span class="cat-color-winner-badge">오늘의 컬러</span>' : ''}
                </span>
                <span class="cat-color-hex">${c.nameEn} · ${c.hex}</span>
              </div>
            </div>
          `;
        }).join('');

        /* ── Complementary palette HTML ── */
        const compHtml = winner.complementary.map(hex => `
          <div class="comp-swatch comp-swatch--secondary">
            <div class="comp-swatch__circle" style="background:${hex};" title="${hex}"></div>
            <span class="comp-swatch__hex">${hex}</span>
          </div>
        `).join('');

        /* ── Products HTML ── */
        const productsHtml = products.map(p => `
          <div class="product-card">
            <div class="product-card__image" style="background-color:${winner.hex}22;">
              ${p.image
                ? `<img src="${p.image}" alt="${p.name}" loading="lazy">`
                : `<span class="product-card__placeholder" aria-hidden="true">✦</span>`}
            </div>
            <div class="product-card__body">
              <p class="product-card__name">${p.name}</p>
              <p class="product-card__price">${p.price}</p>
              <a href="${p.link}" class="product-card__link" target="_blank" rel="noopener">보러가기</a>
            </div>
          </div>
        `).join('');

        /* ── Keywords ── */
        const tagsHtml = winner.keywords.map(k => `<span class="tag">${k}</span>`).join('');

        /* ── Sentence: replace \n with <br> ── */
        const sentenceHtml = winner.sentence.replace(/\n/g, '<br>');

        this._show(`
          <section class="screen screen--result">
            <div class="result-color-band" style="background-color:${winner.hex};" aria-hidden="true">
              <div class="result-color-band__inner">
                <span class="result-color-band__badge">${winner.category}</span>
              </div>
            </div>

            <div class="result-content">
              <h2 class="result-name">${winner.name}</h2>

              <p class="result-sentence">${sentenceHtml}</p>

              <div class="result-keywords" role="list" aria-label="무드 키워드">
                ${tagsHtml}
              </div>

              <div class="category-palette">
                <p class="section-label">${winner.category} 컬러 팔레트</p>
                <div class="category-colors">${catColorsHtml}</div>
              </div>

              <div class="comp-palette">
                <p class="section-label">어울리는 보조 컬러</p>
                <div class="comp-row">
                  <div class="comp-swatch comp-swatch--main">
                    <div class="comp-swatch__circle" style="background:${winner.hex};"></div>
                    <span class="comp-swatch__hex">${winner.hex}</span>
                  </div>
                  ${compHtml}
                </div>
              </div>

              <div class="product-section">
                <p class="section-label">오늘의 당신에게 어울리는 제품</p>
                <div class="product-grid">${productsHtml}</div>
              </div>

              <div class="result-actions">
                <button class="btn btn--primary" id="shareBtn">결과 공유하기</button>
                <button class="btn btn--ghost" id="retryBtn">다시 시작하기</button>
              </div>
            </div>
          </section>
        `);

        document.getElementById('shareBtn').addEventListener('click', () => ShareUtils.share(winner));
        document.getElementById('retryBtn').addEventListener('click', () => App.reset());
      }
    };

    /* ================================================
       SHARE UTILS
    ================================================ */
    const ShareUtils = {
      async share(winner) {
        const text = `오늘의 나는 "${winner.name}" 🎨\n\n${winner.sentence}\n\n${winner.keywords.map(k => '#' + k).join(' ')}\n#오늘의컬러 #ColorMood`;
        const url = window.location.href;

        if (navigator.share) {
          try {
            await navigator.share({ title: '오늘의 컬러 무드', text, url });
            return;
          } catch (_) { /* cancelled */ }
        }

        try {
          await navigator.clipboard.writeText(text + '\n\n' + url);
          this._toast('클립보드에 복사되었어요 ✓');
        } catch (_) {
          this._toast('공유 텍스트를 직접 복사해 주세요.');
        }
      },

      _toast(msg) {
        document.querySelectorAll('.toast').forEach(t => t.remove());
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        el.setAttribute('role', 'status');
        document.body.appendChild(el);
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('toast--visible')));
        setTimeout(() => {
          el.classList.remove('toast--visible');
          setTimeout(() => el.remove(), 400);
        }, 2800);
      }
    };

    /* ================================================
       APP CONTROLLER
    ================================================ */
    const App = {
      init() {
        UIRenderer.init('app');
        UIRenderer.showIntro();
      },

      startTournament() {
        TournamentEngine.init();
        this._nextRound();
      },

      _nextRound() {
        const options = TournamentEngine.nextRound();
        const progress = TournamentEngine.getProgress();
        UIRenderer.showRound(options, progress);
      },

      handlePick(colorObj) {
        const result = TournamentEngine.pick(colorObj);
        if (result.done) {
          UIRenderer.showResult(result.winner);
        } else {
          this._nextRound();
        }
      },

      reset() {
        UIRenderer.showIntro();
      }
    };

    /* ── Bootstrap ── */
    document.addEventListener('DOMContentLoaded', () => App.init());

  })();
  </script>
</body>
</html>
